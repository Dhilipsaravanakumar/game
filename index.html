<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <!-- Required Meta Tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>DSK - Home</title>
  <link rel="stylesheet" href="styles.css">

  <!-- fonts link -->
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">

  <!-- favicon links -->
  <link href="images/favicon.ico" rel="icon" />

</head>

<body class="home">
  <div class="home-wrapper">
    <h1>DSK</h1>
    <p class="tagline">Pick a game to play.</p>

    <div class="game-grid">

      <a class="game-card" href="remember.html">
        <span class="game-card-title">Remember</span>
        <div class="game-card-preview">
          <div class="mini-btn red"></div>
          <div class="mini-btn blue"></div>
          <div class="mini-btn green"></div>
          <div class="mini-btn yellow"></div>
        </div>
        <p class="game-card-desc">
          Watch the color sequence, then repeat it back.<br>
          Miss one and it's game over.
        </p>
        <span class="startgame">Play</span>
      </a>

      <a class="game-card" href="ladder.html">
        <span class="game-card-title">Ladder</span>
        <div class="game-card-preview">
          <div class="mini-btn ladder-tile">A</div>
          <div class="mini-btn ladder-tile">&rarr;</div>
          <div class="mini-btn ladder-tile">Z</div>
        </div>
        <p class="game-card-desc">
          Change one letter at a time to turn the<br>
          start word into the target word.
        </p>
        <span class="startgame">Play</span>
      </a>

    </div>
  </div>

  
</body>

</html>
